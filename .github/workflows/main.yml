name: Scrape Uni Schedule

on:
  schedule:
    # Run every hour at minute 0
    - cron: '0 * * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run scraper
        env:
          WEBSTUDENT_USER: ${{ secrets.WEBSTUDENT_USER }}
          WEBSTUDENT_PASS: ${{ secrets.WEBSTUDENT_PASS }}
        run: python scraper.py
      
      - name: Commit and push schedule files
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add schedule.ics schedule_group10.ics schedule_exercises_group10.ics schedule_lectures_group10.ics schedule.json groups.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update schedule data (ICS feeds for all + Group 10) [skip ci]"
          git push