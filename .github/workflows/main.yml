name: Scrape Uni Schedule

on:
  schedule:
    # Run 3 times daily: 6:00, 12:00, 18:00 UTC (8:00, 14:00, 20:00 Sofia time)
    - cron: '0 6,12,18 * * *'
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: [main]
    paths-ignore:
      - 'schedule.ics'

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run scraper
        env:
          WEBSTUDENT_USER: ${{ secrets.WEBSTUDENT_USER }}
          WEBSTUDENT_PASS: ${{ secrets.WEBSTUDENT_PASS }}
        run: python scraper.py
      
      - name: Commit and push schedule.ics
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add schedule.ics
          git diff --quiet && git diff --staged --quiet || git commit -m "Update schedule.ics [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}